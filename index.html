<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message for You kali❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <div id="layer1" class="layer active">
            <div class="envelope" onclick="nextLayer(1)">
                <span>kali Click to Open 💌</span>
            </div>
        </div>

        <div id="layer2" class="layer">
            <div class="photo-frame">
                <img src="images/her-photo.jpg" alt="The Most Beautiful Person">
                <p>"bandri🙈
                    میں بیمارِ محبت ہوں
مجھے کیا غرض حکیموں سے
میری شفا اگر کرنی ہو
میرا محبوب مجھے دے دو..."</p>
                <button onclick="nextLayer(2)">Continue ✨</button>
            </div>
        </div>

        <div id="layer3" class="layer">
            <div class="proposal-box">
                <h1 class="animate-text">bandri Will You Marry Me? 💍
            </h1>
                <div class="buttons">
                    <button id="yesBtn" onclick="celebrate()">YES!</button>
                    <button id="noBtn" onmouseover="moveButton()">No</button>
                </div>
            </div>
        </div>

        <div id="layer4" class="layer">
            <canvas id="confetti"></canvas>
            <h1>I'm the luckiest person in the world! ❤️😭
        </h1>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
