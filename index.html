<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise for my bandri❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        
        <div id="layer1" class="layer active">
            <div class="envelope" onclick="nextLayer(1)">
                <span>Apke liye ek khat hai... 💌</span>
            </div>
        </div>

        <div id="layer2" class="layer">
            <div class="photo-frame">
                
                <img src="1775062055705.jpg" alt="Our Memories">
                
                <p>"kali ap meri zindagi ka sab se haseen hissa ho..."</p>
                <button onclick="nextLayer(2)">Click for Surprise ✨</button>
            </div>
        </div>

        <div id="layer3" class="layer">
            <div class="proposal-box">
                <h1 class="animate-text">Will You Marry Me bandri? 💍</h1>
                <div class="buttons">
                    <button id="yesBtn" onclick="celebrate()">YES!</button>
                    <button id="noBtn" onmouseover="moveButton()">No</button>
                </div>
            </div>
        </div>

        <div id="layer4" class="layer">
            <h1>I love you forever! ❤️🌍</h1>
            <p>Ab jaldi se mujhe call karo! 😍</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
